<body>

<!-- Loading -->
<div id="loading">
  <div id="load-icon">✈</div>
  <div id="load-title">Trip Expenses</div>
  <div id="load-bar-wrap"><div id="load-bar"></div></div>
  <div id="load-pct">5%</div>
  <div id="load-status">Starting up…</div>
</div>

<!-- Header -->
<header class="header">
  <button class="hbtn back hide" id="hBack" onclick="goBack()">&#8592;</button>
  <span class="htitle" id="hTitle">✈ Trip Expenses</span>
  <div class="hactions" id="hActions"></div>
</header>

<!-- FAB -->
<button id="fab" class="hide">+</button>

<!-- Toast -->
<div id="toast"></div>

<!-- Modal -->
<div class="modal-bg" id="modalBg" onclick="closeBgModal(event)">
  <div class="modal">
    <div class="modal-title" id="modalTitle"></div>
    <div id="modalBody"></div>
  </div>
</div>

<!-- Planner: place form (fixed bottom-sheet overlay) -->
<div id="plan-form-wrap" class="plan-form-overlay" style="display:none" onclick="if(event.target===this)cancelPlannerForm()">
  <div class="plan-form-sheet">
    <div class="ci-form-title">📍 Place Details</div>
    <div class="fg" style="margin-bottom:8px">
      <label>Place <span class="req">*</span></label>
      <div class="plan-suggest-wrap">
        <input class="fc" id="planName" type="text" placeholder="Place name…" autocomplete="off"
               oninput="onPlanNameInput()" onfocus="onPlanNameFocus()" onkeydown="onPlanNameKeydown(event)">
        <div class="suggest-list" id="planSuggest" style="display:none"></div>
      </div>
      <div style="display:flex;gap:8px;align-items:center;margin-top:6px">
        <div style="position:relative;flex:1;min-width:0">
          <input class="fc" id="planTypeInput" type="text" placeholder="Type…" autocomplete="off"
                 oninput="_filterPlanTypeList(this.value)" onfocus="_openPlanTypeList()" onkeydown="_planTypeKeydown(event)">
          <div class="suggest-list" id="planTypeList" style="display:none;min-width:165px;right:auto"></div>
          <input type="hidden" id="planType" value="">
        </div>
        <button type="button" onclick="openMapPicker('planner')" style="background:none;border:none;padding:0;cursor:pointer;font-size:12px;font-weight:700;color:var(--primary);text-decoration:underline;white-space:nowrap;flex-shrink:0">📍 Location</button>
      </div>
      <div class="gps-status" id="planGpsStatus" style="margin-top:4px">
        <div class="gps-dot err" id="planGpsDot"></div>
        <span id="planGpsText" style="flex:1">No location set</span>
      </div>
    </div>
    <div class="fg" style="margin-bottom:12px">
      <label>Description / Notes</label>
      <textarea class="fc" id="planDesc" rows="3" placeholder="Opening hours, tips, notes… Hebrew supported"
                dir="auto" style="resize:vertical;font-size:13px;min-height:72px;max-height:200px;overflow-y:auto"></textarea>
    </div>
    <div id="planDupeWarn" style="display:none;background:#FEF3C7;border:1px solid #FCD34D;border-radius:8px;padding:8px 12px;margin-bottom:10px">
      <div style="font-size:12px;font-weight:700;color:#92400E;margin-bottom:3px">⚠️ Already in bank</div>
      <div style="font-size:12px;color:#92400E;margin-bottom:8px">A place with this name and location is already saved.</div>
      <div style="display:flex;gap:8px;justify-content:flex-end">
        <button class="btn btn-outline btn-sm" onclick="_hideDupeWarn()" style="font-size:11px;min-height:26px;padding:4px 10px">Keep editing</button>
        <button class="btn btn-accent btn-sm" onclick="_saveAnyway()" style="font-size:11px;min-height:26px;padding:4px 10px">Add anyway</button>
      </div>
    </div>
    <div class="btn-row">
      <button class="btn btn-outline btn-sm" onclick="cancelPlannerForm()">Cancel</button>
      <button class="btn btn-accent btn-sm" id="planSaveBtn" onclick="savePlanPlaceUI()">+ Add to Bank</button>
    </div>
  </div>
</div>

<!-- Planner: right-click context menu -->
<div id="plannerContextMenu" style="display:none"></div>

<!-- MAIN -->
<main class="main">
  <?!= include('TripsScreen') ?>
  <?!= include('ExpenseScreen') ?>
  <?!= include('ReportScreen') ?>
  <?!= include('TrackerScreen') ?>
  <?!= include('PlannerScreen') ?>
</main>

<?!= include('MapPicker') ?>

<div id="placesServiceDiv" style="display:none"></div>
<datalist id="dl-currencies"></datalist>

<script>init();</script>
  </body>
</html>
